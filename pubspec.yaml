name: teacher_schedule
description: 教师专属日程管理App - 课表录入、提醒通知、桌面小组件

publish_to: 'none'

version: 2.4.7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 通知
  flutter_local_notifications: ^17.0.0

  # 网络请求（节假日API）
  http: ^1.1.0
  
  # 日期处理
  intl: ^0.19.0
  
  # 本地化支持（DatePicker 等组件需要）
  flutter_localizations:
    sdk: flutter
  
  # UI
  flutter_slidable: ^3.0.1
  animated_text_kit: ^4.2.2
  # 使用系统字体，避免 google_fonts 加载失败导致中文乱码
  # google_fonts: ^6.1.0

  # 工具
  path_provider: ^2.1.1
  permission_handler: ^10.2.0
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  device_calendar: ^4.3.3
  timezone: ^0.9.4

  # Web 广播服务
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  qr_flutter: ^4.1.0
  network_info_plus: ^5.0.3
  # 位置服务已改用原生网络定位，移除 geolocator 以减小体积

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
