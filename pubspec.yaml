name: teacher_schedule
description: 李思杰老师专属日程管理App - 双模式作息、节假日识别、桌面小组件

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 通知
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # 网络请求（节假日API）
  http: ^1.1.0
  
  # 桌面小组件
  home_widget: ^0.9.0
  
  # 日期处理
  intl: ^0.19.0
  
  # UI
  flutter_slidable: ^3.0.1
  animated_text_kit: ^4.2.2
  google_fonts: ^6.1.0
  
  # 工具
  path_provider: ^2.1.1
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/
